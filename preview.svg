<svg xmlns="http://www.w3.org/2000/svg" width="360" height="240" viewBox="0 0 360 240" fill="none">
  <rect width="360" height="240" rx="8" fill="#F8FAFC"/>
  <!-- Success toast -->
  <rect x="20" y="15" width="320" height="65" rx="10" fill="white" stroke="#22C55E" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.08))"/>
  <circle cx="48" cy="47" r="14" fill="#22C55E"/>
  <path d="M42 47L46 51L55 42" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="74" y="42" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#0F172A">Success</text>
  <text x="74" y="60" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">Operation completed</text>
  <!-- Error toast -->
  <rect x="20" y="90" width="320" height="65" rx="10" fill="white" stroke="#EF4444" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.08))"/>
  <circle cx="48" cy="122" r="14" fill="#EF4444"/>
  <text x="48" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="white">!</text>
  <text x="74" y="117" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#0F172A">Error</text>
  <text x="74" y="135" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">Something went wrong</text>
  <!-- Info toast -->
  <rect x="20" y="165" width="320" height="55" rx="10" fill="white" stroke="#3B82F6" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.08))"/>
  <circle cx="48" cy="192" r="14" fill="#3B82F6"/>
  <text x="48" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="white">i</text>
  <text x="74" y="188" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#0F172A">Info</text>
  <text x="74" y="204" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">New update available</text>
  <text x="180" y="234" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">PV Toast</text>
</svg>
